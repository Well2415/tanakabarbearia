  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=1.1.2"></script>
    <script>
      // Forçar limpeza de Service Worker antigo e cache para garantir a entrega do novo código
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('SW desativado para atualizar cache');
          }
        });
        
        // Registrar o novo SW
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=1.0.1', { scope: '/' })
            .then(reg => console.log('PWA ServiceWorker atualizado', reg))
            .catch(err => console.error('PWA erro no registro', err));
        });
      }
    </script>
  </body>
